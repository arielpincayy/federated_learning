services:
  # =========================================================================
  # NIVEL 0: RAIZ DEL ÁRBOL
  # =========================================================================
  central:
    image: federated-system_image:latest
    build: .
    container_name: federated_central
    command: ["python", "main.py", "0.0.0.0:8765", "0.0.0.0:8765"]
    ports:
      - "8765:8765"
    environment:
      - PYTHONUNBUFFERED=1

  # =========================================================================
  # NIVEL 1: NODOS INTERMEDIARIOS (Se conectan a 'central')
  # =========================================================================
  node1:
    image: federated-system_image:latest
    build: .
    container_name: federated_node1
    command: ["python", "main.py", "node1:8766", "central:8765"]
    depends_on:
      - central
    volumes:
      - ./data/Hospital_1.csv:/app/data/Hospital.csv:ro
    environment:
      - PYTHONUNBUFFERED=1

  node2:
    image: federated-system_image:latest
    build: .
    container_name: federated_node2
    command: ["python", "main.py", "node2:8767", "central:8765"]
    depends_on:
      - central
    volumes:
      - ./data/Hospital_2.csv:/app/data/Hospital.csv:ro
    environment:
      - PYTHONUNBUFFERED=1

  # =========================================================================
  # NIVEL 2: NUEVOS NODOS HOJA (Se conectan a los nodos del Nivel 1)
  # =========================================================================
  node3:
    image: federated-system_image:latest
    build: .
    container_name: federated_node3
    command: ["python", "main.py", "node3:8768", "node1:8766"]
    depends_on:
      - central
    volumes:
      - ./data/Hospital_3.csv:/app/data/Hospital.csv:ro
    environment:
      - PYTHONUNBUFFERED=1

  node4:
    image: federated-system_image:latest
    build: .
    container_name: federated_node4
    # Se conecta a node1 (8766)
    command: ["python", "main.py", "node4:8769", "node1:8766"]
    depends_on:
      - node1
    volumes:
      - ./data/Hospital_4.csv:/app/data/Hospital.csv:ro
    environment:
      - PYTHONUNBUFFERED=1

  node5:
    image: federated-system_image:latest
    build: .
    container_name: federated_node5
    # Se conecta a node1 (8766) para balancear la carga de ese subárbol
    command: ["python", "main.py", "node5:8770", "node2:8767"]
    depends_on:
      - node1
    volumes:
      - ./data/Hospital_5.csv:/app/data/Hospital.csv:ro
    environment:
      - PYTHONUNBUFFERED=1

  node6:
    image: federated-system_image:latest
    build: .
    container_name: federated_node6
    # Se conecta a node2 (8767)
    command: ["python", "main.py", "node6:8771", "node2:8767"]
    depends_on:
      - node2
    volumes:
      - ./data/Hospital_6.csv:/app/data/Hospital.csv:ro
    environment:
      - PYTHONUNBUFFERED=1

  node7:
    image: federated-system_image:latest
    build: .
    container_name: federated_node7
    # Se conecta a node3 (8768)
    command: ["python", "main.py", "node7:8772", "node3:8768"]
    depends_on:
      - node3
    volumes:
      - ./data/Hospital_7.csv:/app/data/Hospital.csv:ro
    environment:
      - PYTHONUNBUFFERED=1